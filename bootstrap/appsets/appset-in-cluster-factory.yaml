apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: in-cluster-factory
  namespace: openshift-gitops
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/bemarek/ocp-cluster-factory.git
        revision: HEAD
        files:
          - path: 'overlays/in-cluster/**/kustomization.yaml'
  template:
    metadata:
      # NAME: Dynamic naming skipping the first root segment
      # 1. 'slice .path.segments 1' removes the first element (e.g., 'overlays')
      # 2. 'join "-"' creates a flat name from the remaining path segments
      # This ensures uniqueness without hardcoding directory names.
      name: '{{ slice .path.segments 1 | join "-" }}'
      
      annotations:
        factory.managed-by: ocp-cluster-factory
        
        # KEY: Sync Wave logic - checks the current directory (last segment)
        # Defining $l locally for the key scope.
        ? '{{- $l := index .path.segments (sub (len .path.segments) 1) -}}{{- (regexMatch "^[0-9]+-" $l) | ternary "argocd.argoproj.io/sync-wave" "factory.internal/ignore" -}}'
        
        # VALUE: Extracts the wave number from the current directory
        # Defining $l locally for the value scope.
        : '{{- $l := index .path.segments (sub (len .path.segments) 1) -}}{{- $l | regexFind "^[0-9]+" | default "none" -}}'
        
    spec:
      project: default
      source:
        repoURL: https://github.com/bemarek/ocp-cluster-factory.git
        targetRevision: HEAD
        # The path points to the directory containing kustomization.yaml
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
