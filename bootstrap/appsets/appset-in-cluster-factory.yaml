apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: in-cluster-factory
  namespace: openshift-gitops
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/bemarek/ocp-cluster-factory.git
        revision: HEAD
        files:
          - path: 'overlays/in-cluster/**/kustomization.yaml'
  template:
    metadata:
      # NAME: Dynamically join path segments between root and file
      # Example: overlays/in-cluster/10-core/110-argo/kustomization.yaml -> in-cluster-core-argo
      name: '{{- $rel := slice .path.segments 2 (sub (len .path.segments) 1) -}}in-cluster{{- range $rel -}}-{{- . | regexReplaceAll "^[0-9]+-" "" -}}{{- end -}}'
      
      annotations:
        factory.managed-by: ocp-cluster-factory
        # KEY: Annotation key for Sync Wave (must redefine $l for scope)
        ? '{{- $l := index .path.segments (sub (len .path.segments) 2) -}}{{- (regexMatch "^[0-9]+-" $l) | ternary "argocd.argoproj.io/sync-wave" "factory.internal/ignore" -}}'
        # VALUE: Annotation value extracting the wave number (must redefine $l for scope)
        : '{{- $l := index .path.segments (sub (len .path.segments) 2) -}}{{- $l | regexFind "^[0-9]+" | default "none" -}}'
        
    spec:
      project: default
      source:
        repoURL: https://github.com/bemarek/ocp-cluster-factory.git
        targetRevision: HEAD
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
