apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: in-cluster-factory
  namespace: openshift-gitops
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/bemarek/ocp-cluster-factory.git
        revision: HEAD
        files:
          - path: 'overlays/in-cluster/**/kustomization.yaml'
  template:
    metadata:
      # NAME: We use regexReplaceAll to strip the "10-" prefix if it exists.
      # If it doesn't exist, it leaves the string untouched. Safe and clean.
      name: >-
        {{- $seg := .path.segments -}}
        {{- $len := len $seg -}}
        in-cluster
        {{- range $i, $s := $seg -}}
          {{- if and (gt $i 1) (lt $i (sub $len 1)) -}}
            -{{- $s | regexReplaceAll "^[0-9]+-" "" -}}
          {{- end -}}
        {{- end -}}
      
      annotations:
        factory.managed-by: "ocp-cluster-factory"
        # ANNOTATIONS: We use regexFind to extract the number. 
        # If no number, we use our "ignore" label trick for VSCode peace of mind.
        "{{- $l := index .path.segments (sub (len .path.segments) 2) -}}{{- (regexMatch \"^[0-9]+-\" $l) | ternary \"argocd.argoproj.io/sync-wave\" \"factory.internal/ignore\" -}}": "{{- $l | regexFind \"^[0-9]+\" | default \"none\" -}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/bemarek/ocp-cluster-factory.git
        targetRevision: HEAD
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true