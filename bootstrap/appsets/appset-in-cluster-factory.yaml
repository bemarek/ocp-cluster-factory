apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: in-cluster-factory
  namespace: openshift-gitops
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/bemarek/ocp-cluster-factory.git
        revision: HEAD
        files:
          - path: 'overlays/in-cluster/**/kustomization.yaml'
  template:
    metadata:
      # NAME: Truly dynamic naming
      # 1. Take the directory path (excluding kustomization.yaml)
      # 2. Strip any "XX-" numeric prefixes from ALL path segments
      # 3. Flatten the directory structure by replacing "/" with "-"
      # 4. Remove the redundant "overlays-in-cluster-" prefix if present
      name: >-
        {{- $path := .path.path | dir -}}
        {{- $clean := $path | regexReplaceAll "(^|/)[0-9]+-" "$1" | replace "/" "-" -}}
        {{- $clean | trimPrefix "overlays-in-cluster-" | printf "in-cluster-%s" -}}
      
      annotations:
        factory.managed-by: ocp-cluster-factory
        
        # KEY: Sync Wave logic - depends on the immediate parent folder name
        ? '{{- $l := index .path.segments (sub (len .path.segments) 2) -}}{{- (regexMatch "^[0-9]+-" $l) | ternary "argocd.argoproj.io/sync-wave" "factory.internal/ignore" -}}'
        
        # VALUE: Extract the wave number (independent scope for value)
        : '{{- $l := index .path.segments (sub (len .path.segments) 2) -}}{{- $l | regexFind "^[0-9]+" | default "none" -}}'
        
    spec:
      project: default
      source:
        repoURL: https://github.com/bemarek/ocp-cluster-factory.git
        targetRevision: HEAD
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
